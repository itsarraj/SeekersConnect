# SeekersConnect stack for a VPS.
#
# For TLS with the bundled edge nginx container (dedicated VPS, ports 80/443 free), use:
#   docker compose -f docker-compose.yml -f docker-compose.vps.yml
# If the machine already runs host nginx on 80/443, use loopback publishing instead:
#   docker compose -f docker-compose.yml -f docker-compose.vps-host-edge-reset.yml -f docker-compose.vps-host-edge.yml
# See docker/vps.env.example, docker-compose.vps.yml, and docker/host-nginx/*.example.
#
# Before first run against empty Postgres, apply SQL migrations from each Rust service
# (from your machine or a CI job with DATABASE_URL set), e.g.:
#   cd universal-auth-service && sqlx migrate run
#   cd matchmyresume-bff && sqlx migrate run
#
# Override public URLs for browser clients (Vite / Expo web) so they hit your VPS, not localhost:
#   PUBLIC_AUTH_URL=https://auth.example.com PUBLIC_BFF_URL=https://api.example.com docker compose build --no-cache matchmyresume-web mobile-app-web
#
# Copy this file’s defaults into a root `.env` and change secrets (POSTGRES_PASSWORD, JWT_SECRET,
# RUSTFS_* object-storage keys if you change them from defaults, RESEND_API_KEY, APP_EMAIL__*, etc.).

name: seekersconnect

services:
  postgres:
    image: postgres:16-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_USER: seekers
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-seekers_postgres_password_change_me}
      POSTGRES_DB: uas
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seekers -d uas"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # S3 API :9000, console UI :9001 — same defaults as local dev (rustfsadmin / rustfsadmin).
  # BFF creates the `resumes` bucket on startup via create_bucket_if_not_exists().
  # Host bind mounts need uid/gid 10001:10001 per https://github.com/rustfs/rustfs#docker-quick-start-option-2
  rustfs:
    image: rustfs/rustfs:latest
    restart: unless-stopped
    volumes:
      - rustfs_data:/data
      - rustfs_logs:/logs
    ports:
      - "${RUSTFS_API_PORT:-9000}:9000"
      - "${RUSTFS_CONSOLE_PORT:-9001}:9001"

  universal-auth:
    build:
      context: ./universal-auth-service
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_APPLICATION_HOST: "0.0.0.0"
      APP_APPLICATION_PORT: "8000"
      APP_DATABASE__HOST: postgres
      APP_DATABASE__PORT: "5432"
      APP_DATABASE__USERNAME: seekers
      APP_DATABASE__PASSWORD: ${POSTGRES_PASSWORD:-seekers_postgres_password_change_me}
      APP_DATABASE__DATABASE_NAME: uas
      APP_REDIS__HOST: redis
      APP_REDIS__PORT: "6379"
      APP_JWT__SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-this-in-production}
      APP_EMAIL__API_KEY: ${RESEND_API_KEY:-}
      APP_EMAIL__FROM_EMAIL: ${APP_EMAIL_FROM:-noreply@example.com}
      APP_EMAIL__FROM_NAME: ${APP_EMAIL_FROM_NAME:-SeekersConnect}
      APP_EMAIL__BASE_URL: ${PUBLIC_AUTH_URL:-http://localhost:8000}
      APP_EMAIL__FRONTEND_BASE_URL: ${PUBLIC_WEB_URL:-http://localhost:80}
    ports:
      - "${AUTH_HOST_PORT:-8000}:8000"

  matchmyresume-bff:
    build:
      context: ./matchmyresume-bff
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      universal-auth:
        condition: service_started
      rustfs:
        condition: service_started
    volumes:
      - ./matchmyresume-bff/configuration.docker.yaml:/app/configuration.yaml:ro
    environment:
      # Optional Hugging Face matcher (start with: docker compose --profile ml up -d resume-matcher)
      APP__MATCHER__BASE_URL: ${APP_MATCHER_BASE_URL:-http://resume-matcher:8095}
      APP__MATCHER__INTERNAL_SECRET: ${MATCHER_INTERNAL_SECRET:-}
      APP__DATABASE__PASSWORD: ${POSTGRES_PASSWORD:-seekers_postgres_password_change_me}
      APP__JWT__SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-this-in-production}
      OBJECT_STORAGE__ENDPOINT: http://rustfs:9000
      OBJECT_STORAGE__BUCKET: resumes
      OBJECT_STORAGE__ACCESS_KEY_ID: ${RUSTFS_ACCESS_KEY_ID:-rustfsadmin}
      OBJECT_STORAGE__SECRET_ACCESS_KEY: ${RUSTFS_SECRET_ACCESS_KEY:-rustfsadmin}
      OBJECT_STORAGE__REGION: us-east-1
    ports:
      - "${BFF_HOST_PORT:-8080}:8080"

  # HF embeddings worker (CPU image is large). Enable: docker compose --profile ml up -d resume-matcher
  # Set APP_MATCHER_BASE_URL=http://resume-matcher:8095 and MATCHER_INTERNAL_SECRET in .env (same value on both services).
  resume-matcher:
    profiles:
      - ml
    build:
      context: ./ai-tests
      dockerfile: Dockerfile.matcher
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://seekers:${POSTGRES_PASSWORD:-seekers_postgres_password_change_me}@postgres:5432/matchmyresume_bff
      MATCHER_INTERNAL_SECRET: ${MATCHER_INTERNAL_SECRET:-}
      MATCHER_TOP_K: ${MATCHER_TOP_K:-25}
      MATCHER_MODEL_ID: ${MATCHER_MODEL_ID:-sentence-transformers/all-MiniLM-L6-v2}
    ports:
      - "${MATCHER_HOST_PORT:-8095}:8095"

  matchmyresume-web:
    build:
      context: ./matchmyresume-web-frontend
      dockerfile: Dockerfile
      args:
        VITE_AUTH_API_URL: ${PUBLIC_AUTH_URL:-http://localhost:8000}
        VITE_BFF_API_URL: ${PUBLIC_BFF_URL:-http://localhost:8080}
        VITE_AUTH_API_VERSION: ${VITE_AUTH_API_VERSION:-v1}
        VITE_BFF_API_VERSION: ${VITE_BFF_API_VERSION:-v1}
    restart: unless-stopped
    depends_on:
      matchmyresume-bff:
        condition: service_started
      universal-auth:
        condition: service_started
    ports:
      - "${WEB_HOST_PORT:-80}:80"

  mobile-app-web:
    build:
      context: ./mobile-app
      dockerfile: Dockerfile
      args:
        EXPO_PUBLIC_AUTH_API_URL: ${PUBLIC_AUTH_URL:-http://localhost:8000}
        EXPO_PUBLIC_BFF_API_URL: ${PUBLIC_BFF_URL:-http://localhost:8080}
        EXPO_PUBLIC_AUTH_API_VERSION: ${EXPO_PUBLIC_AUTH_API_VERSION:-v1}
        EXPO_PUBLIC_BFF_API_VERSION: ${EXPO_PUBLIC_BFF_API_VERSION:-v1}
    restart: unless-stopped
    depends_on:
      matchmyresume-bff:
        condition: service_started
      universal-auth:
        condition: service_started
    ports:
      - "${MOBILE_WEB_HOST_PORT:-8081}:80"

volumes:
  postgres_data:
  redis_data:
  rustfs_data:
  rustfs_logs:
