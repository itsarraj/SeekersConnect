# Mounted as /app/configuration.yaml in Docker Compose (Docker network hostnames).
# Secrets: set POSTGRES_PASSWORD and JWT_SECRET in the root .env — compose passes
# APP__DATABASE__PASSWORD and APP__JWT__SECRET (see configuration.rs). OBJECT_STORAGE__*
# in compose overrides RustFS (S3) credentials.

application_host: "0.0.0.0"
application_port: 8080

database:
  host: "postgres"
  port: 5432
  username: "seekers"
  password: "seekers_postgres_password_change_me"
  database_name: "matchmyresume_bff"

redis:
  host: "redis"
  port: 6379
  password: null
  database: 1

auth_service:
  base_url: "http://universal-auth:8000"
  api_version: "v1"

jwt:
  secret: "your-super-secret-jwt-key-change-this-in-production"

stats:
  refresh_interval_minutes: 30

object_storage:
  endpoint: "http://rustfs:9000"
  bucket: "resumes"
  access_key_id: "rustfsadmin"
  secret_access_key: "rustfsadmin"
  region: "us-east-1"
