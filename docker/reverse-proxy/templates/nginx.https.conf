# TLS + reverse proxy (SAN cert: paths use __CERT_PRIMARY_DOMAIN__).

server {
    listen 80;
    server_name __WEB_HOST__ __AUTH_HOST__ __API_HOST__;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name __WEB_HOST__;
    client_max_body_size 64m;

    ssl_certificate     /etc/letsencrypt/live/__CERT_PRIMARY_DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__CERT_PRIMARY_DOMAIN__/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:MSSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=63072000" always;

    location / {
        proxy_pass http://matchmyresume-web:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name __AUTH_HOST__;
    client_max_body_size 16m;

    ssl_certificate     /etc/letsencrypt/live/__CERT_PRIMARY_DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__CERT_PRIMARY_DOMAIN__/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:ASSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=63072000" always;

    location / {
        proxy_pass http://universal-auth:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name __API_HOST__;
    client_max_body_size 64m;

    ssl_certificate     /etc/letsencrypt/live/__CERT_PRIMARY_DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__CERT_PRIMARY_DOMAIN__/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:BSSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=63072000" always;

    location / {
        proxy_pass http://matchmyresume-bff:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
